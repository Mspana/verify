name = "verify-api"
main = "src/index.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]

# Secrets (set per-env via `wrangler secret put <NAME> --env <env>`):
#   TRUTHSCAN_API_KEY   — TruthScan detection API key (per-env)
#   COOKIE_SIGNING_KEY  — 32+ byte random string for HMAC (per-env; rotating invalidates sessions)
# Local development reads them from .dev.vars (gitignored).

# Static frontend served from the same Worker as the API. Temporary
# consolidation — see docs/ARCHITECTURE.md "Deployment architecture — current."
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "VERIFY_KV"
id = "ec8e2822db754dce993b45ce8309937c"

# 04:00 UTC = noon Beijing: avoids the midnight-UTC cron rush and gives us
# daylight hours to investigate a failure before the next run.
[triggers]
crons = ["0 4 * * *"]

[env.staging]
name = "verify-api-staging"

[[env.staging.kv_namespaces]]
binding = "VERIFY_KV"
id = "15173986aaec46deb8577fb97675cd26"

[env.staging.triggers]
crons = ["0 4 * * *"]

[env.production]
name = "verify-api"
routes = [
  { pattern = "yourdomain.com/api/*", zone_name = "yourdomain.com" }
]

[[env.production.kv_namespaces]]
binding = "VERIFY_KV"
id = "ec8e2822db754dce993b45ce8309937c"

[env.production.triggers]
crons = ["0 4 * * *"]
